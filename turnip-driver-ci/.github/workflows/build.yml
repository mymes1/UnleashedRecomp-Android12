name: Build Turnip Unleashed

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'wfm'
        type: choice
        options:
          - clean
          - wfm
          - wfm-nogenclear
          - wfm-novpcattr
          - wfm-a732
          - wfm-a710
          - wfm-univ
          - wfm-smart1
          - wfm-smart2
          - wfm-smart3
      mesa_ref:
        description: 'Mesa branch or tag'
        required: false
        default: '26.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build patchelf unzip flex bison git perl python3-pip glslang-tools ccache zip curl
          pip3 install --break-system-packages meson mako

      - name: Build
        env:
          VARIANT: ${{ inputs.variant }}
          MESA_REF: ${{ inputs.mesa_ref }}
        run: |
          chmod +x turnip_builder.sh
          ./turnip_builder.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Turnip-${{ inputs.variant }}
          path: turnip_workdir/Turnip-*.zip
